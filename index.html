<!-- ===================== INDEX.HTML ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robux Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: rgba(0,0,0,0.2);
    }

    a { color: white; text-decoration: none; margin-left: 15px; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .packages {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .order-box {
      margin-top: 30px;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      display: none;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<header>
  <h2>Robux Shop</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
</header>

<div class="container">
  <h1>Buy Robux Easily 💎</h1>
  <p>Select your package below</p>

  <div class="packages" id="packages"></div>

  <div class="order-box" id="orderBox">
    <h3 id="selected"></h3>
    <p>1. Click buy<br>2. Purchase gamepass<br>3. Send proof</p>

    <a id="link" target="_blank">👉 Open Gamepass</a>

    <input placeholder="Your Roblox Username">
    <textarea placeholder="Screenshot proof link"></textarea>

    <select>
      <option>Bank Transfer (IBAN)</option>
      <option>Cash</option>
    </select>

    <button>Submit Order</button>
  </div>
</div>

<script>
const packages = [
  { amount: 700, price: "5€", link: "#" },
  { amount: 1400, price: "10€", link: "#" },
  { amount: 2100, price: "15€", link: "#" },
];

const container = document.getElementById("packages");

packages.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <h3>${p.amount} Robux</h3>
    <p>${p.price}</p>
    <button onclick="selectPack('${p.amount}','${p.link}')">Buy</button>
  `;
  container.appendChild(div);
});

function selectPack(amount, link) {
  document.getElementById("orderBox").style.display = "block";
  document.getElementById("selected").innerText = amount + " Robux";
  document.getElementById("link").href = link;
}
</script>

</body>
</html>
